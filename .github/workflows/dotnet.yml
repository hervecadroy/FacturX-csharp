name: .NET

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: 8.0.x
      - name: Restore dependencies test
        run: dotnet restore FacturX.Test/FacturX.Test.csproj
      - name: Build test
        run: dotnet build FacturX.Test/FacturX.Test.csproj --no-restore
      - name: Actual test
        run: dotnet test FacturX.Test/FacturX.Test.csproj --no-build --verbosity normal
      - name: Restore library dependencies
        run: dotnet restore FacturX/FacturX.csproj
      - name: Build library
        run: dotnet build FacturX/FacturX.csproj --no-restore
